<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Play a fully functional Cyberpunk Neon themed Chess game. Play against a Minimax AI, watch AI vs AI, or connect with friends for 1v1 Online Multiplayer using WebRTC.">
    <meta name="keywords"
        content="chess, neon chess, cyberpunk chess, javascript chess, multiplayer chess, online chess, minimax AI">
    <meta property="og:title" content="Neon Cyberpunk Chess">
    <meta property="og:description"
        content="Play a fully functional Cyberpunk Neon themed Chess game against AI or friends online.">
    <meta property="og:type" content="website">
    <title>Neon Cyberpunk Chess</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;500&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css?v=2">
</head>

<body>
    <div id="app">
        <aside id="sidebar">
            <h1 class="glow-text">NEON CHESS</h1>
            <div class="menu-section mode-section">
                <h2>Game Mode</h2>
                <button id="btn-1vc" class="active">Player vs AI</button>
                <button id="btn-cvc">AI vs AI</button>
                <button id="btn-online">Online 1v1</button>
            </div>

            <div id="online-controls" class="menu-section hidden">
                <h2>Multiplayer</h2>
                <p>Your ID: <span id="my-id" class="glow-text-cyan">Connecting...</span></p>
                <input type="text" id="peer-id-input" placeholder="Enter Friend's ID">
                <button id="btn-connect">Connect</button>
                <p id="connection-status"></p>
            </div>

            <div class="menu-section actions-section">
                <h2>Actions</h2>
                <button id="btn-redo">Redo Move</button>
                <button id="btn-hint">Auto-Solve</button>
                <button id="btn-reset">Reset Game</button>
            </div>

            <div class="menu-section status-section">
                <h2>Status</h2>
                <p id="turn-indicator" class="glow-text-cyan" aria-live="polite">White's Turn</p>
                <p id="game-status" aria-live="polite"></p>
            </div>
        </aside>

        <main id="game-area" role="application" aria-label="Chess Game">
            <div class="player-info opponent-info">
                <div class="captured-pieces" id="captured-black"></div>
            </div>

            <div id="board-container">
                <div id="chessboard"></div>
            </div>

            <div class="player-info player-info-bottom">
                <div class="captured-pieces" id="captured-white"></div>
            </div>
        </main>

        <aside id="history-sidebar">
            <h2>Move History</h2>
            <div id="move-history"></div>
        </aside>
    </div>

    <div id="welcome-modal" class="modal-overlay">
        <div class="modal-content">
            <h1 class="glow-text">NEON CHESS</h1>
            <p class="author-text">Made with <span style="color: var(--pink)">❤</span> by dev sAgar</p>
            <button id="btn-continue" class="modal-btn">Continue</button>
        </div>
    </div>

    <div id="game-over-modal" class="modal-overlay hidden">
        <div class="modal-content">
            <h1 id="game-over-title" class="glow-text">GAME OVER</h1>
            <p id="game-over-message" class="game-over-text"></p>
            <p id="game-over-countdown" class="author-text" style="margin-top: 10px; font-size: 1.1rem;">Restarting in
                <span id="countdown-timer" class="glow-text-cyan">5</span>s...</p>
            <button id="btn-review-board" class="modal-btn" style="margin-top: 15px;">Review Board</button>
            <button id="btn-play-again" class="modal-btn hidden">Play Again</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.0/dist/peerjs.min.js"></script>
    <script src="script.js"></script>
</body>

</html>
